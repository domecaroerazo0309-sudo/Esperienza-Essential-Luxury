<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esperienza Essential Luxury</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    input { padding: 10px; width: 100%; max-width: 360px; }
    button { padding: 10px 14px; margin-top: 10px; cursor: pointer; }
    .msg { margin-top: 14px; }
    img { margin-top: 18px; max-width: 100%; height: auto; border: 1px solid #eee; border-radius: 8px; }
    .hint { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Introduce tu código</h2>
  <p class="hint">Si el código es correcto, se mostrará la imagen.</p>

  <input id="code" placeholder="Ej: 12345" />
  \

  <button id="btn">Ver imagen</button>

  <div id="msg" class="msg"></div>
  <div id="imgwrap"></div>

<script>
  // 1) MAPA: código -> archivo de imagen
  // Cambia los códigos y nombres de archivo por los tuyos
  const codes = {
    "12345": { img: "Img/IMG_8734.jpeg",sender: "Daniel"},
    "67890": { img: "Img/IMG_8773.jpeg",sender: "Carolina"}
  };

  function show() {
    const c = document.getElementById("code").value.trim();
    const msg = document.getElementById("msg");
    const imgwrap = document.getElementById("imgwrap");

    msg.textContent = "";
    imgwrap.innerHTML = "";
const entry = codes[c];

if (!entry) {
  msg.textContent = "Codice non valido. Controlla e riprova.";
  return;
}

msg.textContent = `Ciao, il tuo luxury box è stato inviato da: ${entry.sender}`;

const img = document.createElement("img");
img.src = entry.img;      // <- importante: entry.img
    const img = document.createElement("img");
img.src = entry.img;

img.onerror = () => {
  msg.textContent = `Non riesco a caricare l'immagine: ${entry.img}`;
};

imgwrap.appendChild(img);
img.alt = "Luxury box";
imgwrap.appendChild(img);
    
  });
</script>
</body>
</html>
