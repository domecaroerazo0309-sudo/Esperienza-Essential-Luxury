<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esperienza Essential Luxury</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    input { padding: 10px; width: 100%; max-width: 360px; }
    button { padding: 10px 14px; margin-top: 10px; cursor: pointer; }
    .msg { margin-top: 14px; }
    img { margin-top: 18px; max-width: 100%; height: auto; border: 1px solid #eee; border-radius: 8px; }
  </style>
</head>

<body>
  <h2>Chi lo invia?</h2>
  <p>Scoprilo.</p>

  <input id="code" placeholder="Inserisci il codice" />
  \

  <button id="btn">Ver imagen</button>

  <div id="msg" class="msg"></div>
  <div id="imgwrap"></div>

  <script>
    // Código -> imagen + sender
    const codes = {
      "12345": { img: "img/IMG_8785.jpeg", sender: "Carolina" },
      "67890": { img: "img/IMG_8834.png", sender: "Daniel" }
    }

    function show() {
      const c = document.getElementById("code").value.trim();
      const msg = document.getElementById("msg");
      const imgwrap = document.getElementById("imgwrap");

      msg.textContent = "";
      imgwrap.innerHTML = "";

      const entry = codes[c];

      if (!entry) {
        msg.textContent = "Codice non valido. Controlla e riprova.";
        return;
      }

      msg.textContent = `Ciao, il tuo luxury box è stato inviato da: ${entry.sender}`;

      const img = document.createElement("img");
      img.src = entry.img;

      img.onerror = () => {
        msg.textContent = `Non riesco a caricare l'immagine: ${entry.img}`;
      };

      imgwrap.appendChild(img);
    }

    document.getElementById("btn").addEventListener("click", show);
    document.getElementById("code").addEventListener("keydown", (e) => {
      if (e.key === "Enter") show();
    });
  </script>
</body>
</html>
